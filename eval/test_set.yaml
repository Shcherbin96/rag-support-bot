# Evaluation test set.
# Case types:
#   grounded  — answer exists in the knowledge base; verify cited source + key fact
#   refuse    — answer is absent or outside the domain; the assistant must refuse
#   smalltalk — conversational message; the assistant should answer without citations

- id: shipping_price
  type: grounded
  question: "How much is shipping?"
  expect_source: shipping
  expect_keyword: "5.99"

- id: free_shipping
  type: grounded
  question: "What is the free shipping threshold?"
  expect_source: shipping
  expect_keyword: "49"

- id: return_period
