name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy rag_bot

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Build knowledge-base index
        run: uv run python -m rag_bot.ingestion

      # Coverage is gated on Linux only: the pass/fail signal should not depend
      # on platform-specific coverage drift, and one authoritative number is
      # easier to reason about than three slightly different ones.
      - name: Run tests
        if: runner.os != 'Linux'
        run: uv run pytest -q

      - name: Run tests with coverage gate
        if: runner.os == 'Linux'
        run: uv run pytest -q --cov=rag_bot --cov-fail-under=87

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v4

      # Build-only: proves the image assembles from the pinned base + frozen
      # lockfile (incl. CPU-only torch). No registry push — the Dockerfile is
      # the artifact.
      - name: Build image
        run: docker build -t rag-bot:ci .
