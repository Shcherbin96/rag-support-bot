name: CI

on:
  push:
    branches: [main, portfolio-v1]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Build knowledge-base index
        run: uv run python -m rag_bot.ingestion

      - name: Run tests
        run: uv run pytest -q
